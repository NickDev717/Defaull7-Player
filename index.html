<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defaull7 Player</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">🎵 Defaull7 Player</div>
            <nav class="nav-tabs">
                <button class="nav-tab active" onclick="switchView(this, 'folders')">📁 Pastas</button>
                <button class="nav-tab" onclick="switchView(this, 'playlists')">📋 Playlists</button>
                <button class="nav-tab" onclick="switchView(this, 'favorites')">❤️ Favoritos</button>
            </nav>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleTheme()" title="Alternar Tema">🎨</button>
                <button class="icon-btn" onclick="showAbout()" title="Sobre">ℹ️</button>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3 class="sidebar-title">Biblioteca</h3>
                <div class="sidebar-item active" onclick="filterLibrary(this, 'all')">
                    <span>🎵</span> Todas as Mídias
                </div>
                <div class="sidebar-item" onclick="filterLibrary(this, 'audio')">
                    <span>🎧</span> Áudios
                </div>
                <div class="sidebar-item" onclick="filterLibrary(this, 'video')">
                    <span>🎬</span> Vídeos
                </div>
            </div>
            
            <div class="sidebar-section">
                <h3 class="sidebar-title">Organização</h3>
                <div class="sidebar-item" onclick="filterLibrary(this, 'artists')">
                    <span>🎤</span> Artistas
                </div>
                <div class="sidebar-item" onclick="filterLibrary(this, 'albums')">
                    <span>💿</span> Álbuns
                </div>
            </div>

            <div class="file-input-container">
                <input type="file" id="fileInput" multiple accept="audio/*,video/*" style="display: none;">
                <button class="file-input-btn" onclick="document.getElementById('fileInput').click()">
                    📁 Adicionar Mídia
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-header">
                <h1 class="content-title">Biblioteca</h1>
                <input type="text" id="searchBox" class="search-box" placeholder="🔍 Buscar...">
            </div>

            <div class="video-container" id="videoContainer" style="display: none;">
                <video id="videoPlayer" controls></video>
            </div>

            <div class="track-list" id="trackList">
                <!-- Tracks will be inserted here -->
            </div>
        </main>

        <!-- Playlist Panel -->
        <aside class="playlist-panel">
            <div class="playlist-header">
                <h3>Fila de Reprodução</h3>
                <button class="playlist-btn" onclick="clearPlaylist()">🗑️ Limpar</button>
            </div>
            <div class="playlist-content" id="playlistContent">
                <div class="playlist-empty">
                    Arraste arquivos ou clique em "Adicionar Mídia" para começar
                </div>
            </div>
        </aside>

        <!-- Player Controls -->
        <div class="player-controls">
            <div class="now-playing">
                <div class="now-playing-cover" id="nowPlayingCover">🎵</div>
                <div class="now-playing-info">
                    <div class="now-playing-title" id="nowPlayingTitle">Nenhuma música</div>
                    <div class="now-playing-artist" id="nowPlayingArtist">-</div>
                </div>
            </div>

            <div class="controls-center">
                <div class="control-buttons">
                    <button class="control-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Aleatório">🔀</button>
                    <button class="control-btn" onclick="previousTrack()" title="Anterior">⏮</button>
                    <button class="control-btn play" id="playBtn" onclick="togglePlay()" title="Play/Pause">▶</button>
                    <button class="control-btn" onclick="nextTrack()" title="Próxima">⏭</button>
                    <button class="control-btn" id="repeatBtn" onclick="toggleRepeat()" title="Repetir">🔁</button>
                </div>
                <div class="progress-bar">
                    <span class="progress-time" id="currentTime">0:00</span>
                    <div class="progress-slider" id="progressSlider">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span class="progress-time" id="totalTime">0:00</span>
                </div>
            </div>

            <div class="controls-right">
                <span>🔊</span>
                <div class="volume-slider" id="volumeSlider">
                    <div class="volume-fill" id="volumeFill"></div>
                </div>
            </div>
        </div>

        <audio id="audioPlayer" style="display: none;"></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
